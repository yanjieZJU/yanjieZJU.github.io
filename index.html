<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yanjie - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 40px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #667eea;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .projects {
            display: grid;
            gap: 30px;
        }

        .project-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 30px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }

        .project-card h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #333;
        }

        .project-card p {
            margin-bottom: 15px;
            color: #666;
        }

        .project-link {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.3s ease;
        }

        .project-link:hover {
            background: #764ba2;
        }

        .contact {
            text-align: center;
            padding: 30px;
            background: #f5f5f5;
            border-radius: 12px;
        }

        .contact a {
            color: #667eea;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1em;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Yanjie</h1>
            <p class="subtitle">研究生 | 开发者</p>
        </header>

        <div class="content">
            <section class="section">
                <h2>关于我</h2>
                <p>欢迎来到我的个人主页！我是一名研究生，专注于软件开发和研究工作。</p>
            </section>

            <section class="section">
                <h2>项目展示</h2>
                <div class="projects">
                    <div class="project-card">
                        <h3>ErgoKARE</h3>
                        <p>一种基于知识增强的大型语言模型方法，用于视频的工效学风险筛查及建议生成</p>
                        <a href="https://github.com/yanjieZJU/ErgoKARE" class="project-link" target="_blank">查看项目 →</a>
                    </div>

                    <div class="project-card">
                        <h3>DiaMaid</h3>
                        <p>面向系统设计的Agentic Workflow</p>
                        <a href="https://github.com/yanjieZJU/DiaMaid" class="project-link" target="_blank">查看项目 →</a>
                    </div>
                </div>
            </section>

            <section class="section">
                <div class="contact">
                    <h2 style="margin-bottom: 20px;">联系方式</h2>
                    <a href="https://github.com/yanjieZJU" target="_blank">GitHub</a>
                    <a href="mailto:your.email@example.com">Email</a>
                </div>
            </section>
        </div>

        <footer>
            <p>&copy; 2026 Yanjie. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
